<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Cyber System</title>
    <style>
        /* === VARIÁVEIS & RESET === */
        :root {
            --bg-base: #020203;
            --glow-red: #ff003c;
            --glow-blue: #0051ff;
            --pure-white: #ffffff;
            --pure-black: #000000;
            
            --glass-bg: rgba(6, 6, 10, 0.8);
            --glass-border: rgba(255, 255, 255, 0.03);
            --glass-shadow: 0 0 50px rgba(0, 81, 255, 0.1);
            
            --text-primary: #ffffff;
            --text-secondary: #8c9bb0;
            --error: #ff2a5f;
            --warning-border: #ffb700;
            --warning-text: #ffd000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.04), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 81, 255, 0.04), transparent 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            padding: 1.5rem;
            overflow: hidden;
        }

        /* === LINHAS FLUTUANTES NO FUNDO === */
        .cyber-lines-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .c-line {
            position: absolute;
            width: 150%;
            left: -25%;
            height: 2px;
            opacity: 0;
        }

        .c-line.red {
            top: 20%;
            background: linear-gradient(90deg, transparent, var(--glow-red), transparent);
            box-shadow: 0 0 12px var(--glow-red);
            animation: shootLine 4s linear infinite 0.5s;
        }

        .c-line.blue {
            top: 55%;
            background: linear-gradient(90deg, transparent, var(--glow-blue), transparent);
            box-shadow: 0 0 12px var(--glow-blue);
            animation: shootLine 5s linear infinite 2s;
        }

        .c-line.white {
            top: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--pure-white), transparent);
            box-shadow: 0 0 8px var(--pure-white);
            animation: shootLine 3s linear infinite 1s;
        }

        .c-line.black {
            top: 40%;
            height: 8px;
            background: var(--pure-black);
            animation: shootLine 6s linear infinite 0s;
        }

        @keyframes shootLine {
            0% { transform: translateX(-100%) rotate(-1deg); opacity: 0; }
            50% { opacity: 0.8; }
            95% { opacity: 0.8; }
            100% { transform: translateX(100%) rotate(-1deg); opacity: 0; }
        }

        /* === SPLASH SCREEN (PORTA COM CORTE INCLINADO / ) === */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .splash-door {
            position: absolute;
            inset: 0;
            background: #000000;
            pointer-events: auto;
            transition: transform 1.4s cubic-bezier(0.77, 0, 0.175, 1), opacity 1.4s ease;
            z-index: 9998;
            will-change: transform;
        }

        /* Divisão Superior Esquerda usando a inclinação / */
        .door-left {
            clip-path: polygon(0 0, 100% 0, 0 100%);
            border-bottom: 2px solid var(--glow-red);
        }

        /* Divisão Inferior Direita usando a inclinação / */
        .door-right {
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            border-top: 2px solid var(--glow-blue);
        }

        /* Animação corrigida acompanhando perfeitamente a linha diagonal inclinada */
        .door-left.open {
            transform: translate(-100%, -100%);
            opacity: 0;
        }

        .door-right.open {
            transform: translate(100%, 100%);
            opacity: 0;
        }

        /* Texto do Splash Estilo Jogo */
        #splash-text-container {
            z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
        }

        #splash-text-container.hide {
            opacity: 0;
            transform: scale(0.7) rotate(-4deg);
            filter: blur(15px);
        }

        .splash-text {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 3.8rem;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--pure-white); /* Cor interna alterada para Branco Puro conforme solicitado */
            
            /* Contorno duplo com Neon mantido */
            text-shadow: 
                -2px -2px 0 var(--glow-red),  
                 2px -2px 0 var(--glow-red),
                -2px  2px 0 var(--glow-blue),
                 2px  2px 0 var(--glow-blue),
                 0px  0px 20px var(--glow-blue),
                 0px  0px 40px var(--glow-red);
                 
            animation: gamePulse 1.5s infinite alternate;
            text-align: center;
            user-select: none;
        }

        @keyframes gamePulse {
            0% { transform: scale(1) skewX(-4deg); filter: drop-shadow(0 0 10px rgba(0, 81, 255, 0.5)); }
            100% { transform: scale(1.04) skewX(-4deg); filter: drop-shadow(0 0 25px rgba(255, 0, 60, 0.7)); }
        }

        /* === GLASSMORPHISM CONTAINER INTERFACE === */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Linhas Estilizadas de Detalhe nas Bordas do Painel */
        .glass-panel::before, .glass-panel::after {
            content: '';
            position: absolute;
            height: 2px;
            width: 40px;
        }
        .glass-panel::before { top: 0; left: 20px; background: var(--glow-red); box-shadow: 0 0 10px var(--glow-red); }
        .glass-panel::after { bottom: 0; right: 20px; background: var(--glow-blue); box-shadow: 0 0 10px var(--glow-blue); }

        .glass-panel.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* === UTILITÁRIOS === */
        .hidden { display: none !important; }

        .screen {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .screen:not(.hidden) {
            animation: screenFadeIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes screenFadeIn {
            0% { opacity: 0; transform: scale(0.96); filter: blur(4px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        h2 {
            font-size: 1.4rem;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.15);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        /* === TELA 1: LISTA DE USUÁRIOS COM LINHAS AO PASSAR O MOUSE === */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            pointer-events: none;
        }

        .user-list.interactive {
            pointer-events: auto;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-35px);
            transition: all 0.35s cubic-bezier(0.215, 0.610, 0.355, 1);
            position: relative;
            overflow: hidden;
        }

        /* Linhas Neon internas que varrem o card ao passar o mouse (Hover) */
        .user-card::before, .user-card::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            left: -100%;
            transition: left 0.4s ease;
        }
        /* Linha vermelha no topo do card */
        .user-card::before {
            top: 0;
            background: linear-gradient(90deg, transparent, var(--glow-red), transparent);
        }
        /* Linha azul na base do card */
        .user-card::after {
            bottom: 0;
            background: linear-gradient(90deg, transparent, var(--glow-blue), transparent);
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(6px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: -5px 0 15px rgba(0, 81, 255, 0.1), 5px 0 15px rgba(255, 0, 60, 0.1);
        }

        /* Ativa a varredura das linhas internas no hover */
        .user-card:hover::before { left: 100%; }
        .user-card:hover::after { left: 100%; transition-delay: 0.05s; }

        .user-card.drop-in {
            animation: cascadeDrop 0.55s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes cascadeDrop {
            0% { opacity: 0; transform: translateY(-40px); filter: blur(6px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Moldura branca/preta sutil no avatar */
        .avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        .user-name {
            font-weight: normal;
            letter-spacing: 1.5px;
            font-size: 0.95rem;
        }

        /* === TELAS DE INTERAÇÃO (LOGIN / EXIBIÇÃO) === */
        .btn-back {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            width: fit-content;
            transition: color 0.3s, transform 0.3s;
            margin-bottom: -0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-back:hover {
            color: var(--glow-red);
            transform: translateX(-4px);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        input[type="password"] {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 1.1rem;
            color: var(--glow-blue);
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 0.5em;
            outline: none;
            width: 100%;
            transition: all 0.4s ease;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.7);
        }

        input[type="password"]:focus {
            border-color: var(--glow-blue);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.7), 0 0 15px rgba(0, 81, 255, 0.3);
            color: var(--pure-white);
            text-shadow: 0 0 8px var(--glow-blue);
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            text-align: center;
            letter-spacing: 1px;
            min-height: 20px;
            text-transform: uppercase;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
        }

        .btn-primary {
            background: transparent;
            color: #fff;
            border: 1px solid var(--glow-blue);
            border-radius: 10px;
            padding: 1rem;
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            width: 100%;
        }

        .btn-primary:hover {
            background: rgba(0, 81, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 81, 255, 0.4);
            border-color: var(--pure-white);
        }

        /* CAIXA DE CREDENCIAIS (TELA 3) */
        .credentials-box {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 1rem 0;
            line-height: 1.8;
            font-size: 0.95rem;
            color: #a3b8cc;
            position: relative;
        }

        .credentials-box::before {
            content: '';
            position: absolute;
            left: 0; top: 15%; height: 70%; width: 2px;
            background: linear-gradient(180deg, var(--glow-red), var(--glow-blue));
            box-shadow: 0 0 8px var(--glow-blue);
        }

        .cred-header {
            color: #fff;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.12);
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .cred-title {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .cred-details {
            padding-left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cred-details span { color: #fff; letter-spacing: 1px; }

        .alert-link {
            display: block;
            text-align: center;
            padding: 1rem;
            margin-top: 0.5rem;
            border: 1px solid var(--warning-border);
            background: rgba(255, 183, 0, 0.04);
            color: var(--warning-text);
            text-decoration: none;
            letter-spacing: 1px;
            border-radius: 10px;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .alert-link:hover {
            background: rgba(255, 183, 0, 0.12);
            box-shadow: 0 0 15px rgba(255, 183, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="cyber-lines-container">
        <div class="c-line red"></div>
        <div class="c-line blue"></div>
        <div class="c-line white"></div>
        <div class="c-line black"></div>
    </div>

    <div id="splash-screen">
        <div class="splash-door door-left" id="door-l"></div>
        <div class="splash-door door-right" id="door-r"></div>
        
        <div id="splash-text-container">
            <div class="splash-text">Password Discover 1</div>
        </div>
    </div>

    <div class="glass-panel" id="main-panel">
        
        <div id="screen-1" class="screen hidden">
            <div>
                <h2>Usuários</h2>
                <p class="subtitle">Selecione o terminal para descriptografia</p>
            </div>
            <div class="user-list" id="user-list-container"></div>
        </div>

        <div id="screen-2" class="screen hidden">
            <button class="btn-back" onclick="goToScreen(1)">← Abortar</button>
            <h2 id="login-title">Acesso</h2>
            
            <div class="input-group">
                <input type="password" id="password-input" placeholder="••••••" inputmode="numeric" maxlength="6">
                <div id="error-msg" class="error-message hidden">Assinatura Incorreta</div>
            </div>
            
            <button class="btn-primary" onclick="validateLogin()">Injetar Token</button>
        </div>

        <div id="screen-3" class="screen hidden">
            <button class="btn-back" onclick="logout()">← Encerrar Sessão</button>
            <h2>Dados Extraídos</h2>
            
            <div class="credentials-box" id="credentials-content"></div>
            
            <a href="https://chat-sec1.vercel.app" target="_blank" rel="noopener noreferrer" class="alert-link">
                Acesse o chat
            </a>
        </div>
    </div>

    <script>
        // === BANCO DE DADOS CRIPTOGRAFADO ===
        const usersDB = [
            {
                id: 1,
                name: "ARTHUR G.",
                pin: "789321",
                gradient: "linear-gradient(135deg, #cc0000 0%, #220000 100%)",
                credentials: `
                    <div class="cred-header">LOGIN MARCADO ATUAL: ARTHUR G.</div>
                    <div class="cred-title">Login:</div>
                    <div class="cred-details">
                        <span>NOME: Arthur</span>
                        <span>SENHA: 569012</span>
                    </div>
                `
            },
            {
                id: 2,
                name: "CRISTIAN L.",
                pin: "852465",
                gradient: "linear-gradient(135deg, #0022cc 0%, #000022 100%)",
                credentials: `
                    <div class="cred-header">LOGIN MARCADO ATUAL: CRISTIAN L.</div>
                    <div class="cred-title">Login:</div>
                    <div class="cred-details">
                        <span>NOME: Cristian</span>
                        <span>SENHA: 032311</span>
                    </div>
                `
            },
            {
                id: 3,
                name: "RUAN V.",
                pin: "094578",
                gradient: "linear-gradient(135deg, #222 0%, #000 100%)",
                credentials: `
                    <div class="cred-header">LOGIN MARCADO ATUAL: RUAN V.</div>
                    <div class="cred-title">Login:</div>
                    <div class="cred-details">
                        <span>NOME: Ruan</span>
                        <span>SENHA: 094578</span>
                    </div>
                `
            },
            {
                id: 4,
                name: "DIEGO B.",
                pin: "378901",
                gradient: "linear-gradient(135deg, #440099 0%, #110022 100%)",
                credentials: `
                    <div class="cred-header">LOGIN MARCADO ATUAL: DIEGO B.</div>
                    <div class="cred-title">Login:</div>
                    <div class="cred-details">
                        <span>NOME: Diego</span>
                        <span>SENHA: 378901</span>
                    </div>
                `
            },
            {
                id: 5,
                name: "THÉO M.",
                pin: "769840",
                gradient: "linear-gradient(135deg, #005533 0%, #001105 100%)",
                credentials: `
                    <div class="cred-header">LOGIN MARCADO ATUAL: THÉO M.</div>
                    <div class="cred-title">Login:</div>
                    <div class="cred-details">
                        <span>NOME: 769840</span>
                        <span>SENHA: Não informada</span>
                    </div>
                `
            },
            {
                id: 6,
                name: "LUCCA V.",
                pin: "876598",
                gradient: "linear-gradient(135deg, #ff8c00 0%, #331c00 100%)",
                credentials: `
                    <div class="cred-header">LOGIN MARCADO ATUAL: LUCCA V.</div>
                    <div class="cred-title">Login:</div>
                    <div class="cred-details">
                        <span>NOME: Lucca</span>
                        <span>SENHA: 768798</span>
                    </div>
                `
            }
        ];

        let currentUser = null;

        // === RENDERIZAR INTERFACE ===
        function renderUserList() {
            const container = document.getElementById('user-list-container');
            container.innerHTML = '';
            container.classList.remove('interactive'); 

            usersDB.forEach((user, index) => {
                const initial = user.name.charAt(0).toUpperCase();
                const card = document.createElement('div');
                card.className = 'user-card';
                card.style.animationDelay = `${index * 0.14}s`;
                card.onclick = () => selectUser(user);
                
                card.innerHTML = `
                    <div class="avatar" style="background: ${user.gradient}">${initial}</div>
                    <span class="user-name">${user.name}</span>
                `;
                container.appendChild(card);
            });
        }

        // === GERENCIAMENTO DAS PORTAS DIAGONAIS ===
        window.onload = () => {
            renderUserList();

            // 1. Mantém o texto pulsando por 2 segundos e some com ele
            setTimeout(() => {
                document.getElementById('splash-text-container').classList.add('hide');

                // 2. Transiciona a abertura das portas inclinadas (/)
                setTimeout(() => {
                    document.getElementById('door-l').classList.add('open');
                    document.getElementById('door-r').classList.add('open');

                    // 3. Mostra o painel centralizado durante o deslizamento
                    setTimeout(() => {
                        // Deleta o elemento para liberar a memória e ponteiros de toque
                        setTimeout(() => {
                            document.getElementById('splash-screen').style.display = 'none';
                        }, 1400);

                        document.getElementById('main-panel').classList.add('show');
                        document.getElementById('screen-1').classList.remove('hidden');

                        // 4. Inicia efeito cascata sequencial nos usuários
                        const cards = document.querySelectorAll('.user-card');
                        cards.forEach(card => card.classList.add('drop-in'));

                        // 5. Libera cliques operacionais após a última queda
                        const finishTime = (usersDB.length * 140) + 550;
                        setTimeout(() => {
                            document.getElementById('user-list-container').classList.add('interactive');
                        }, finishTime);

                    }, 500);
                }, 500);
            }, 2000);
        };

        // === REGRAS DE NAVEGAÇÃO INTERNA ===
        function selectUser(user) {
            currentUser = user;
            document.getElementById('login-title').innerText = `Terminal: ${user.name}`;
            goToScreen(2);
        }

        function validateLogin() {
            if (!currentUser) return;

            const input = document.getElementById('password-input');
            const errorMsg = document.getElementById('error-msg');
            const password = input.value;

            errorMsg.classList.add('hidden');
            void errorMsg.offsetWidth; 

            if (password === currentUser.pin) {
                input.value = '';
                document.getElementById('credentials-content').innerHTML = currentUser.credentials;
                
                input.style.borderColor = "#00ff66";
                input.style.color = "#00ff66";
                setTimeout(() => {
                    input.style.borderColor = "";
                    input.style.color = "";
                    goToScreen(3);
                }, 300);
            } else {
                errorMsg.classList.remove('hidden');
                input.style.borderColor = "var(--error)";
                input.style.color = "var(--error)";
                setTimeout(() => {
                    input.style.borderColor = "";
                    input.style.color = "";
                    input.value = '';
                    input.focus();
                }, 600);
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('credentials-content').innerHTML = '';
            goToScreen(1);
        }

        function goToScreen(screenNumber) {
            document.getElementById('screen-1').classList.add('hidden');
            document.getElementById('screen-2').classList.add('hidden');
            document.getElementById('screen-3').classList.add('hidden');

            document.getElementById('error-msg').classList.add('hidden');
            document.getElementById('password-input').value = '';

            if (screenNumber === 1) {
                const container = document.getElementById('user-list-container');
                container.classList.remove('interactive');
                const cards = document.querySelectorAll('.user-card');
                cards.forEach(card => {
                    card.classList.remove('drop-in');
                    void card.offsetWidth;
                    card.classList.add('drop-in');
                });
                setTimeout(() => container.classList.add('interactive'), (usersDB.length * 140) + 550);
            }

            document.getElementById(`screen-${screenNumber}`).classList.remove('hidden');

            if (screenNumber === 2) {
                setTimeout(() => document.getElementById('password-input').focus(), 100);
            }
        }

        document.getElementById('password-input').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                validateLogin();
            }
        });
    </script>
</body>
</html>
