<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <style>
        /* === CONFIGURAÇÕES DE CORES === */
        :root {
            --bg-base: #000000;
            --cyber-red: #ff0000;
            --cyber-blue: #0000ff;
            --cyber-white: #ffffff;
            
            --panel-bg: rgba(6, 6, 6, 0.9);
            --panel-border: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #607080;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', monospace;
        }

        body {
            background-color: var(--bg-base);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* === LINHAS DE FUNDO === */
        .cyber-lines-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .line {
            position: absolute;
            width: 100%;
            height: 2px;
            opacity: 0;
            animation: moveLines 5s linear infinite;
        }
        .line.red { background: var(--cyber-red); top: 20%; animation-delay: 0s; }
        .line.blue { background: var(--cyber-blue); top: 70%; animation-delay: 2.5s; }
        .line.white { background: var(--cyber-white); top: 45%; height: 1px; animation-delay: 1.2s; }

        @keyframes moveLines {
            0% { transform: translateY(-30px); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(30px); opacity: 0; }
        }

        /* === SPLASH SCREEN (SISTEMA DE PORTA EM "/" REAL) === */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .door {
            position: absolute;
            inset: 0;
            background: #0a0a0a;
            transition: transform 1.4s cubic-bezier(0.85, 0, 0.15, 1);
            will-change: transform;
        }

        /* Divisão Superior Esquerda bem inclinada em "/" */
        .door-left {
            clip-path: polygon(0 0, 100% 0, 0 100%);
            border-bottom: 3px solid var(--cyber-red);
        }

        /* Divisão Inferior Direita bem inclinada em "/" */
        .door-right {
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            border-top: 3px solid var(--cyber-blue);
        }

        /* Animação disparada pelo JS: afasta as duas partes seguindo a linha diagonal */
        .door-left.open {
            transform: translate(-100%, -100%);
        }

        .door-right.open {
            transform: translate(100%, 100%);
        }

        /* TEXTO PRINCIPAL (BRANCO, INCLINADO E CONTORNADO) */
        #splash-text-container {
            position: relative;
            z-index: 10000;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        #splash-text-container.hide {
            opacity: 0;
            transform: scale(0.9) rotate(-3deg);
        }

        .splash-text {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            font-style: italic; /* Letra inclinada de jogo */
            text-transform: uppercase;
            color: var(--cyber-white); /* Cor interna Branca */
            letter-spacing: 3px;
            
            /* Contorno duplo marcante */
            text-shadow: 
                -3px -3px 0px var(--cyber-red),  
                 3px -3px 0px var(--cyber-red),
                -3px  3px 0px var(--cyber-blue),
                 3px  3px 0px var(--cyber-blue);
            
            text-align: center;
            user-select: none;
        }

        /* === PAINEL DA INTERFACE === */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-left: 4px solid var(--cyber-red);
            border-right: 4px solid var(--cyber-blue);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2rem;
            z-index: 10;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .glass-panel.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* === COMPONENTES INTERNOS === */
        .hidden { display: none !important; }

        .screen {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h2 {
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* LISTA DE USUÁRIOS */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            pointer-events: none;
        }

        .user-list.interactive {
            pointer-events: auto;
        }

        .user-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-20px);
            transition: background 0.3s, transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .user-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--cyber-red), var(--cyber-blue));
            transition: width 0.3s ease;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .user-card:hover::after {
            width: 100%;
        }

        .user-card.drop-in {
            animation: cascadeDrop 0.5s ease forwards;
        }

        @keyframes cascadeDrop {
            0% { opacity: 0; transform: translateY(-25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #fff;
        }

        /* FORMULÁRIOS */
        .btn-back {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            width: fit-content;
        }

        .btn-back:hover { color: var(--cyber-red); }

        input[type="password"] {
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 1rem;
            color: var(--cyber-blue);
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.3em;
            outline: none;
            width: 100%;
        }

        input[type="password"]:focus {
            border-color: var(--cyber-blue);
            color: var(--cyber-white);
        }

        .error-message {
            color: var(--cyber-red);
            font-size: 0.85rem;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-primary {
            background: transparent;
            color: #fff;
            border: 1px solid var(--cyber-blue);
            border-radius: 6px;
            padding: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary:hover {
            background: rgba(0, 0, 255, 0.2);
            border-color: var(--cyber-white);
        }

        .credentials-box {
            background: #050505;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 1.25rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .cred-header {
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .alert-link {
            display: block;
            text-align: center;
            padding: 0.75rem;
            border: 1px solid #ffb700;
            color: #ffb700;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="cyber-lines-container">
        <div class="line red"></div>
        <div class="line blue"></div>
        <div class="line white"></div>
    </div>

    <div id="splash-screen">
        <div class="door door-left" id="door-l"></div>
        <div class="door door-right" id="door-r"></div>
        
        <div id="splash-text-container">
            <div class="splash-text">Password Discover 1</div>
        </div>
    </div>

    <div class="glass-panel" id="main-panel">
        
        <div id="screen-1" class="screen hidden">
            <div>
                <h2>Usuários</h2>
                <p class="subtitle">Selecione para descriptografar</p>
            </div>
            <div class="user-list" id="user-list-container"></div>
        </div>

        <div id="screen-2" class="screen hidden">
            <button class="btn-back" onclick="goToScreen(1)">← Voltar</button>
            <h2 id="login-title">Acesso</h2>
            <input type="password" id="password-input" placeholder="••••••" inputmode="numeric" maxlength="6">
            <div id="error-msg" class="error-message hidden">Acesso Negado</div>
            <button class="btn-primary" onclick="validateLogin()">Validar</button>
        </div>

        <div id="screen-3" class="screen hidden">
            <button class="btn-back" onclick="logout()">← Sair</button>
            <h2>Credenciais</h2>
            <div class="credentials-box" id="credentials-content"></div>
            <a href="https://vercel.app" target="_blank" rel="noopener noreferrer" class="alert-link">
                chat-sec1.vercel.app
            </a>
        </div>
    </div>

    <script>
        const usersDB = [
            { id: 1, name: "ARTHUR G.", pin: "789321", color: "#cc0000", credentials: `<div class="cred-header">USUÁRIO: ARTHUR G.</div><div><span>NOME: Arthur</span><br><span>SENHA: 569012</span></div>` },
            { id: 2, name: "CRISTIAN L.", pin: "852465", color: "#0022cc", credentials: `<div class="cred-header">USUÁRIO: CRISTIAN L.</div><div><span>NOME: Cristian</span><br><span>SENHA: 032311</span></div>` },
            { id: 3, name: "RUAN V.", pin: "094578", color: "#333333", credentials: `<div class="cred-header">USUÁRIO: RUAN V.</div><div><span>NOME: Ruan</span><br><span>SENHA: 094578</span></div>` },
            { id: 4, name: "DIEGO B.", pin: "378901", color: "#5500aa", credentials: `<div class="cred-header">USUÁRIO: DIEGO B.</div><div><span>NOME: Diego</span><br><span>SENHA: 378901</span></div>` },
            { id: 5, name: "THÉO M.", pin: "769840", color: "#006644", credentials: `<div class="cred-header">USUÁRIO: THÉO M.</div><div><span>NOME: 769840</span><br><span>SENHA: Não informada</span></div>` }
        ];

        let currentUser = null;

        function renderUserList() {
            const container = document.getElementById('user-list-container');
            container.innerHTML = '';
            container.classList.remove('interactive'); 

            usersDB.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.style.animationDelay = `${index * 0.12}s`;
                card.onclick = () => selectUser(user);
                
                card.innerHTML = `
                    <div class="avatar" style="background: ${user.color}">${user.name.charAt(0)}</div>
                    <span class="user-name">${user.name}</span>
                `;
                container.appendChild(card);
            });
        }

        // CONTROLADOR DO FLUXO DE ENTRADA E ANIMAÇÃO
        window.onload = () => {
            renderUserList();

            // 1. O texto fica parado por 1.8 segundos, depois desaparece
            setTimeout(() => {
                document.getElementById('splash-text-container').classList.add('hide');

                // 2. Logo em seguida, as portas abrem deslizando diagonalmente "/"
                setTimeout(() => {
                    document.getElementById('door-l').classList.add('open');
                    document.getElementById('door-r').classList.add('open');

                    // 3. Ativa o painel de fundo enquanto a porta abre
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                        document.getElementById('main-panel').classList.add('show');
                        document.getElementById('screen-1').classList.remove('hidden');

                        const cards = document.querySelectorAll('.user-card');
                        cards.forEach(card => card.classList.add('drop-in'));

                        setTimeout(() => {
                            document.getElementById('user-list-container').classList.add('interactive');
                        }, (usersDB.length * 120) + 400);

                    }, 600); // Sincronia perfeita no meio do movimento das portas
                }, 400);
            }, 1800);
        };

        function selectUser(user) {
            currentUser = user;
            document.getElementById('login-title').innerText = `Login: ${user.name}`;
            goToScreen(2);
        }

        function validateLogin() {
            if (!currentUser) return;
            const input = document.getElementById('password-input');
            const errorMsg = document.getElementById('error-msg');

            errorMsg.classList.add('hidden');

            if (input.value === currentUser.pin) {
                input.value = '';
                document.getElementById('credentials-content').innerHTML = currentUser.credentials;
                goToScreen(3);
            } else {
                errorMsg.classList.remove('hidden');
                input.value = '';
                input.focus();
            }
        }

        function logout() {
            currentUser = null;
            goToScreen(1);
        }

        function goToScreen(screenNumber) {
            document.getElementById('screen-1').classList.add('hidden');
            document.getElementById('screen-2').classList.add('hidden');
            document.getElementById('screen-3').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');

            if (screenNumber === 1) {
                const container = document.getElementById('user-list-container');
                container.classList.remove('interactive');
                const cards = document.querySelectorAll('.user-card');
                cards.forEach(card => {
                    card.classList.remove('drop-in');
                    void card.offsetWidth;
                    card.classList.add('drop-in');
                });
                setTimeout(() => container.classList.add('interactive'), (usersDB.length * 120) + 400);
            }

            document.getElementById(`screen-${screenNumber}`).classList.remove('hidden');
            if (screenNumber === 2) {
                setTimeout(() => document.getElementById('password-input').focus(), 100);
            }
        }
    </script>
</body>
</html>
